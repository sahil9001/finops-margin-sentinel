version = 1

[workspaces.default.sources.stripe]
variables = {}
secrets = ["STRIPE_API_KEY"]
origin = "bundled"

[workspaces.default.sources.langfuse]
variables = { LANGFUSE_BASE_URL = "https://api.langfuse.com" }
secrets = ["LANGFUSE_PUBLIC_KEY", "LANGFUSE_SECRET_KEY"]
origin = { file = "coral-specs/langfuse.yaml" }

[workspaces.default.sources.posthog]
variables = { POSTHOG_API_BASE = "https://us.i.posthog.com" }
secrets = ["POSTHOG_API_KEY"]
origin = "bundled"
